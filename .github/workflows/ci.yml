name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Unit tests: no OPC UA dependency. This is the promise that the whole policy
  # engine, approval flow, audit and fail-closed behaviour run on FakeBackend
  # with nothing external installed.
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev only, no asyncua)
        run: pip install -e ".[dev]"
      - name: Run unit tests (excluding integration)
        run: pytest -m "not integration" -q

  # Integration tests: exercise otgate against a real asyncua OPC UA server.
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with the opcua extra)
        run: pip install -e ".[dev,opcua]"
      - name: Run integration tests (real OPC UA)
        run: pytest -m integration -q
