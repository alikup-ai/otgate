<svg xmlns="http://www.w3.org/2000/svg" width="787" height="354" viewBox="0 0 787 354" font-family="ui-monospace, SFMono-Regular, &#x27;SF Mono&#x27;, Menlo, Consolas, &#x27;Liberation Mono&#x27;, monospace" font-size="14"><rect width="787" height="354" rx="10" fill="#1a1b26"/><rect width="787" height="34" rx="10" fill="#24283b"/><rect y="24" width="787" height="10" fill="#24283b"/><circle cx="20" cy="17" r="6" fill="#ff5f57"/><circle cx="40" cy="17" r="6" fill="#febc2e"/><circle cx="60" cy="17" r="6" fill="#28c840"/><text x="393.5" y="22" fill="#7a88cf" text-anchor="middle" font-size="12">otgate demo</text><text x="20.0" y="52" fill="#86e1fc" xml:space="preserve">$ </text><text x="36.8" y="52" fill="#c8d3f5" xml:space="preserve">python examples/demo.py</text><text x="20.0" y="96" fill="#7a88cf" xml:space="preserve">otgate — LLM agent writing to an industrial OPC UA reactor, gated by policy</text><text x="20.0" y="140" fill="#c8d3f5" xml:space="preserve">  read temperature (PV)                      </text><text x="398.0" y="140" fill="#4fd6be" xml:space="preserve" font-weight="700">ALLOW</text><text x="440.0" y="140" fill="#c8d3f5" xml:space="preserve">  read allowed → 55.0</text><text x="20.0" y="162" fill="#c8d3f5" xml:space="preserve">  write setpoint = 60°C (in range)           </text><text x="398.0" y="162" fill="#ffc777" xml:space="preserve" font-weight="700">ASK</text><text x="423.2" y="162" fill="#c8d3f5" xml:space="preserve">    needs human approval</text><text x="20.0" y="184" fill="#7a88cf" xml:space="preserve">    → operator approves                      </text><text x="398.0" y="184" fill="#4fd6be" xml:space="preserve" font-weight="700">APPROVED</text><text x="465.2" y="184" fill="#c8d3f5" xml:space="preserve">  executed → server now 60.0</text><text x="20.0" y="206" fill="#c8d3f5" xml:space="preserve">  write setpoint = 200°C (out of range)      </text><text x="398.0" y="206" fill="#ff757f" xml:space="preserve" font-weight="700">DENY</text><text x="431.6" y="206" fill="#c8d3f5" xml:space="preserve">   outside allowed range [40, 80]</text><text x="20.0" y="228" fill="#c8d3f5" xml:space="preserve">  write setpoint = 60°C while ESD active     </text><text x="398.0" y="228" fill="#ff757f" xml:space="preserve" font-weight="700">DENY</text><text x="431.6" y="228" fill="#c8d3f5" xml:space="preserve">   interlock active: Reactor.ESD == True</text><text x="20.0" y="250" fill="#c8d3f5" xml:space="preserve">  write setpoint = 58°C, approve after ESD   </text><text x="398.0" y="250" fill="#ff757f" xml:space="preserve" font-weight="700">DENIED</text><text x="448.4" y="250" fill="#c8d3f5" xml:space="preserve"> blocked on re-check (interlock)</text><text x="20.0" y="272" fill="#c8d3f5" xml:space="preserve">  write setpoint = 78°C one second later     </text><text x="398.0" y="272" fill="#ff757f" xml:space="preserve" font-weight="700">DENY</text><text x="431.6" y="272" fill="#c8d3f5" xml:space="preserve">   rate too high: 28 in 1s &gt; 5 per 60s</text><text x="20.0" y="316" fill="#7a88cf" xml:space="preserve">  every call is recorded in an append-only audit log.</text></svg>